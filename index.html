<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TisCreation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      min-height: 100vh;
    }

    header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid #1e1e2e;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: #6b7280;
      letter-spacing: 0.05em;
    }

    main {
      padding: 48px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    .card {
      background: #16161f;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .card:hover {
      border-color: #2e2e42;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .tag-english {
      background: rgba(167, 139, 250, 0.15);
      color: #a78bfa;
    }

    .tag-shift {
      background: rgba(96, 165, 250, 0.15);
      color: #60a5fa;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f0f0f0;
    }

    .card-desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }

    .card-arrow {
      margin-top: 20px;
      font-size: 13px;
      color: #4b5563;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .card:hover .card-arrow {
      color: #a78bfa;
    }

    footer {
      padding: 32px 40px;
      border-top: 1px solid #1e1e2e;
      text-align: center;
      font-size: 12px;
      color: #374151;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">TisCreation</div>
    <div class="subtitle">ツール・マニュアル集</div>
  </header>

  <main>
    <div class="section-title">Englishおさる</div>
    <div class="card-grid">
      <a class="card" href="./englishosaru-dashboard.html">
        <span class="card-tag tag-english">Dashboard</span>
        <div class="card-title">退会率ダッシュボード</div>
        <div class="card-desc">退会率・施策の進捗をまとめたモニタリング画面</div>
        <div class="card-arrow">開く →</div>
      </a>
    </div>

    <div class="section-title">SHIFT AI</div>
    <div class="card-grid">
      <div class="card" style="opacity:0.3; cursor:default;">
        <span class="card-tag tag-shift">Coming Soon</span>
        <div class="card-title">準備中</div>
        <div class="card-desc">マニュアル・資料を順次追加予定</div>
      </div>
    </div>
  </main>

  <footer>
    © 2026 TisCreation · takuya-hikino
  </footer>

</body>
</html>
